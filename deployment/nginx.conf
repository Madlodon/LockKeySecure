server {
    listen 80;
    server_name laniproject.dev www.laniproject.dev;

    # Certbot va automatiquement remplacer ce bloc par un redirect HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name laniproject.dev www.laniproject.dev;

    root /var/www/lockkeysecure/public;
    index index.php;

    # Certbot va remplir ces lignes automatiquement
    ssl_certificate /etc/letsencrypt/live/laniproject.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/laniproject.dev/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}